services:
  mysql:
    image: mysql:8.0
    container_name: opsboard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-incidentdb}
      MYSQL_USER: ${MYSQL_USER:-opsboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opsboard_pw}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opsboard-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  incident-service:
    build:
      context: ./incident-service
    container_name: opsboard-incident-service
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-incidentdb}
      MYSQL_USER: ${MYSQL_USER:-opsboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opsboard_pw}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  ops-service:
    build:
      context: ./ops-service
    container_name: opsboard-ops-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INCIDENT_SERVICE_BASE_URL: http://incident-service:8081
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      incident-service:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: opsboard-gateway
    environment:
      INCIDENT_SERVICE_BASE_URL: http://incident-service:8081
      OPS_SERVICE_BASE_URL: http://ops-service:8082
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - incident-service
      - ops-service

  frontend-dashboard:
    build:
      context: ./frontend-dashboard
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: opsboard-frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data:
